<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course - Direct Marketing Mastery School</title>
  
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/js/utm.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/auth.js"></script>
  
  <style>
    .course-hero {
      background: linear-gradient(135deg, var(--accent-primary) 0%, #6b8cce 100%);
      padding: 4rem 0;
      color: white;
    }
    
    .course-hero__content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
    }
    
    .course-hero__image {
      width: 100%;
      border-radius: var(--radius-lg);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    
    .course-hero__title {
      font-size: var(--text-3xl);
      margin-bottom: 1rem;
    }
    
    .course-hero__description {
      font-size: var(--text-lg);
      opacity: 0.9;
      margin-bottom: 2rem;
    }
    
    .course-hero__meta {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
    }
    
    .course-hero__meta-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .course-hero__price {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    
    .lessons-section {
      padding: 4rem 0;
    }
    
    .lessons-list {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .lesson-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem;
      background: var(--bg-primary);
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
      box-shadow: var(--shadow-light);
      transition: all 0.3s ease;
    }
    
    .lesson-item:hover {
      transform: translateX(4px);
    }
    
    .lesson-item--locked {
      opacity: 0.7;
    }
    
    .lesson-item__number {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-primary);
      color: white;
      border-radius: var(--radius-full);
      font-weight: 600;
      flex-shrink: 0;
    }
    
    .lesson-item__content {
      flex: 1;
    }
    
    .lesson-item__title {
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    
    .lesson-item__meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .lesson-item__badge {
      padding: 0.15rem 0.5rem;
      background: var(--accent-secondary);
      color: #1a202c;
      font-size: 0.7rem;
      font-weight: 600;
      border-radius: var(--radius-full);
    }
    
    .lesson-item__action {
      flex-shrink: 0;
    }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--bg-secondary);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin-bottom: 2rem;
    }
    
    .progress-bar__fill {
      height: 100%;
      background: var(--accent-primary);
      border-radius: var(--radius-full);
      transition: width 0.5s ease;
    }
    
    .curriculum-map {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1rem;
      margin: 2rem 0;
      padding: 2rem;
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-light);
    }
    
    .curriculum-step {
      text-align: center;
      padding: 1rem;
      border-radius: var(--radius-md);
      transition: all 0.3s ease;
    }
    
    .curriculum-step--active {
      background: var(--accent-primary);
      color: white;
    }
    
    .curriculum-step--completed {
      background: var(--accent-success);
      color: white;
    }
    
    .curriculum-step i {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      display: block;
    }
    
    @media (max-width: 768px) {
      .course-hero__content {
        grid-template-columns: 1fr;
      }
      
      .curriculum-map {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body x-data="courseDetail()" x-init="init()">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  <header class="header">
    <div class="header__inner">
      <a href="/" class="header__logo">
        <i class="ph ph-graduation-cap" style="font-size: 1.5rem;"></i>
        F.O.T.F. School
      </a>
      <nav class="header__nav">
        <a href="/courses/">Courses</a>
        <a href="/blog/">Blog</a>
        <a href="/services.html">Consulting</a>
        <template x-if="!$store.auth.isAuthenticated">
          <a href="/login.html" class="btn btn--primary" style="padding: var(--space-2) var(--space-4);">Sign In</a>
        </template>
        <template x-if="$store.auth.isAuthenticated">
          <a href="/dashboard/">
            <i class="ph ph-user-circle" style="font-size: 1.5rem;"></i>
          </a>
        </template>
        <button class="theme-toggle" @click="$store.theme.toggle()">
          <i class="ph" :class="$store.theme.mode === 'dark' ? 'ph-sun' : 'ph-moon'"></i>
        </button>
      </nav>
    </div>
  </header>
  
  <main id="main-content">
    <!-- Loading State -->
    <div x-show="loading" class="section">
      <div class="container">
        <div class="skeleton" style="height: 400px; border-radius: var(--radius-lg);"></div>
      </div>
    </div>
    
    <!-- Course Content -->
    <template x-if="!loading && course">
      <div>
        <!-- Hero Section -->
        <section class="course-hero">
          <div class="container">
            <div class="course-hero__content">
              <div>
                <h1 class="course-hero__title" x-text="course.title"></h1>
                <p class="course-hero__description" x-text="course.description || 'Master the fundamentals of marketing with practical, principle-based training.'"></p>
                
                <div class="course-hero__meta">
                  <div class="course-hero__meta-item">
                    <i class="ph ph-video"></i>
                    <span x-text="lessons.length + ' lessons'"></span>
                  </div>
                  <div class="course-hero__meta-item">
                    <i class="ph ph-clock"></i>
                    <span>Self-paced</span>
                  </div>
                  <div class="course-hero__meta-item">
                    <i class="ph ph-certificate"></i>
                    <span>Certificate</span>
                  </div>
                </div>
                
                <template x-if="!hasAccess">
                  <div>
                    <div class="course-hero__price" x-text="'$' + (course.price / 100)"></div>
                    <button @click="purchase" class="btn btn--secondary" style="font-size: 1.1rem; padding: 1rem 2rem;">
                      <i class="ph ph-shopping-cart"></i>
                      Enroll Now
                    </button>
                    <p style="font-size: 0.9rem; opacity: 0.8; margin-top: 1rem;">
                      <i class="ph ph-check-circle"></i>
                      Lifetime access • 30-day guarantee
                    </p>
                  </div>
                </template>
                
                <template x-if="hasAccess">
                  <div>
                    <div class="progress-bar" style="background: rgba(255,255,255,0.2);">
                      <div class="progress-bar__fill" :style="'width: ' + progress + '%'"></div>
                    </div>
                    <p x-text="progress + '% complete'"></p>
                    <a :href="'/dashboard/lesson.html?course=' + course.slug + '&lesson=' + (lessons.find(l => !l.completed)?.slug || lessons[0]?.slug)" 
                       class="btn btn--secondary" style="font-size: 1.1rem; padding: 1rem 2rem; margin-top: 1rem;">
                      <i class="ph ph-play-circle"></i>
                      <span x-text="progress > 0 ? 'Continue Learning' : 'Start Learning'"></span>
                    </a>
                  </div>
                </template>
              </div>
              
              <img 
                :src="course.cover_image_url || 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800&h=600&fit=crop'" 
                :alt="course.title"
                class="course-hero__image"
              >
            </div>
          </div>
        </section>
        
        <!-- Curriculum Map -->
        <section class="section" style="background: var(--bg-secondary);">
          <div class="container">
            <h2 class="text-center" style="margin-bottom: 1rem;">Your Learning Path</h2>
            <p class="text-center" style="color: var(--text-secondary); margin-bottom: 2rem;">
              Progress through the complete marketing stack
            </p>
            
            <div class="curriculum-map">
              <div class="curriculum-step curriculum-step--active">
                <i class="ph ph-magnifying-glass"></i>
                <span>Research</span>
              </div>
              <div class="curriculum-step">
                <i class="ph ph-rocket"></i>
                <span>Traffic</span>
              </div>
              <div class="curriculum-step">
                <i class="ph ph-funnel"></i>
                <span>Funnels</span>
              </div>
              <div class="curriculum-step">
                <i class="ph ph-envelope"></i>
                <span>Email</span>
              </div>
              <div class="curriculum-step">
                <i class="ph ph-trend-up"></i>
                <span>Advanced</span>
              </div>
            </div>
          </div>
        </section>
        
        <!-- Lessons List -->
        <section class="lessons-section">
          <div class="container">
            <h2 class="text-center" style="margin-bottom: 3rem;">Course Content</h2>
            
            <div class="lessons-list">
              <template x-for="(lesson, index) in lessons" :key="lesson.id">
                <div class="lesson-item" :class="{ 'lesson-item--locked': !lesson.has_access }">
                  <div class="lesson-item__number" x-text="index + 1"></div>
                  
                  <div class="lesson-item__content">
                    <h3 class="lesson-item__title" x-text="lesson.title"></h3>
                    <div class="lesson-item__meta">
                      <span x-show="lesson.is_free_preview" class="lesson-item__badge">
                        <i class="ph ph-gift"></i> Free Preview
                      </span>
                      <span x-show="lesson.completed" style="color: var(--accent-success);">
                        <i class="ph ph-check-circle"></i> Completed
                      </span>
                    </div>
                  </div>
                  
                  <div class="lesson-item__action">
                    <template x-if="lesson.has_access">
                      <a :href="'/dashboard/lesson.html?course=' + course.slug + '&lesson=' + lesson.slug" 
                         class="btn btn--primary" style="padding: 0.5rem 1rem;">
                        <i class="ph ph-play"></i>
                        Watch
                      </a>
                    </template>
                    <template x-if="!lesson.has_access">
                      <button @click="purchase" class="btn btn--outline" style="padding: 0.5rem 1rem;">
                        <i class="ph ph-lock"></i>
                        Unlock
                      </button>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </section>
        
        <!-- CTA Section for non-buyers -->
        <template x-if="!hasAccess">
          <section class="section" style="background: var(--bg-secondary);">
            <div class="container">
              <div class="card text-center" style="max-width: 600px; margin: 0 auto;">
                <i class="ph ph-sparkle" style="font-size: 3rem; color: var(--accent-secondary); margin-bottom: 1rem;"></i>
                <h2>Lifetime Access</h2>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">
                  Purchase once, own forever. No subscriptions. No platform fees.
                  Your data, your progress, completely portable.
                </p>
                <button @click="purchase" class="btn btn--secondary" style="font-size: 1.1rem; padding: 1rem 2rem;">
                  <i class="ph ph-shopping-cart"></i>
                  Get Instant Access
                </button>
              </div>
            </div>
          </section>
        </template>
      </div>
    </template>
    
    <!-- Not Found -->
    <div x-show="!loading && !course" class="section text-center">
      <div class="container">
        <i class="ph ph-warning-circle" style="font-size: 4rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
        <h2>Course Not Found</h2>
        <p style="color: var(--text-secondary);">The course you're looking for doesn't exist or has been removed.</p>
        <a href="/courses/" class="btn btn--primary" style="margin-top: 2rem;">
          <i class="ph ph-arrow-left"></i>
          Browse All Courses
        </a>
      </div>
    </div>
  </main>
  
  <footer class="footer">
    <div class="footer__inner">
      <p>&copy; 2026 Direct Marketing Mastery School. All rights reserved.</p>
    </div>
  </footer>
  
  <script>
    const API_BASE_URL = window.location.origin.includes('localhost') 
      ? 'http://localhost:8788' 
      : 'https://fotf-platform-staging.destinhounkpef.workers.dev';
    
    function courseDetail() {
      return {
        course: null,
        lessons: [],
        hasAccess: false,
        progress: 0,
        loading: true,
        
        async init() {
          const slug = window.location.pathname.split('/').pop();
          
          try {
            const headers = {};
            const token = localStorage.getItem('token');
            if (token) {
              headers['Authorization'] = `Bearer ${token}`;
            }
            
            const response = await fetch(`${API_BASE_URL}/api/courses/${slug}`, { headers });
            
            if (response.ok) {
              const data = await response.json();
              this.course = data.course;
              this.lessons = data.lessons;
              this.hasAccess = data.has_access;
              this.progress = data.progress;
            }
          } catch (error) {
            console.error('Failed to load course:', error);
          } finally {
            this.loading = false;
          }
        },
        
        async purchase() {
          if (!Alpine.store('auth').isAuthenticated) {
            window.location.href = `/login.html?redirect=${encodeURIComponent(window.location.pathname)}`;
            return;
          }
          
          try {
            const response = await fetch(`${API_BASE_URL}/api/payments/checkout`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
              },
              body: JSON.stringify({ course_id: this.course.id })
            });
            
            const data = await response.json();
            
            if (response.ok && data.checkout_url) {
              window.location.href = data.checkout_url;
            } else {
              alert(data.error?.message || 'Failed to start checkout');
            }
          } catch (error) {
            console.error('Checkout error:', error);
            alert('Failed to start checkout');
          }
        }
      };
    }
  </script>
</body>
</html>
